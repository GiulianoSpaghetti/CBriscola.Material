name: .NET AVALONIA Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]

    env:
      Solution_Name: cbriscola.slnx
      Configuration: ${{ matrix.configuration }}

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'
    - run: dotnet build cbriscola.Desktop/cbriscola.Desktop.csproj -c $env:Configuration -r win-x64
      shell: pwsh

    - name: Upload Avalonia App
      uses: actions/upload-artifact@v7
      with:
        name: App
        path: cbriscola.Desktop/bin/Release/net10.0-windows10.0.26100.0
        include-hidden-files: true
        if-no-files-found: error
